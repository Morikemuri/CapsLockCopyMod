buildscript {
    repositories {
        maven { url = 'https://maven.minecraftforge.net' }
        mavenCentral()
    }
    dependencies {
        classpath group: 'net.minecraftforge.gradle', name: 'ForgeGradle', version: '4.1.+', changing: true
    }
}

apply plugin: 'net.minecraftforge.gradle'
apply plugin: 'java'

java.toolchain.languageVersion = JavaLanguageVersion.of(8)
compileJava.options.encoding = 'UTF-8'

version = '1.0.0'
group = 'gg.nade'
archivesBaseName = 'capslockcopy'

minecraft {
    mappings channel: 'official', version: '1.16.5'
    runs {
        client {
            workingDirectory project.file('run')
            mods { capslockcopy { source sourceSets.main } }
        }
    }
}

dependencies {
    minecraft 'net.minecraftforge:forge:1.16.5-36.1.2'
}

jar {
    manifest {
        attributes([
            "Specification-Title"    : "capslockcopy",
            "Specification-Vendor"   : "nade",
            "Specification-Version"  : "1",
            "Implementation-Title"   : project.name,
            "Implementation-Version" : project.version,
            "Implementation-Vendor"  : "nade",
        ])
    }
}
